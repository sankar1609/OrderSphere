spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
jwt:
  secret: my-super-secret-key-which-is-long-enough
  expiration: 3600000
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
# Make Eureka client configuration driven by environment variables so the service
# doesn't always attempt to register to localhost (which causes Connection refused
# when there is no Eureka server running). You can enable registration by setting
# EUREKA_CLIENT_REGISTER_WITH_EUREKA=true and EUREKA_CLIENT_FETCH_REGISTRY=true
# or override the server URL with EUREKA_SERVER_URL.
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    # Default to false to avoid noisy connection errors in local/dev environments
    register-with-eureka: ${EUREKA_CLIENT_REGISTER_WITH_EUREKA:true}
    fetch-registry: ${EUREKA_CLIENT_FETCH_REGISTRY:true}
  instance:
    prefer-ip-address: true
