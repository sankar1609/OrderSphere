server:
  port: 8085

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8080
          predicates:
            - Path=/auth/**

        - id: actuator-auth
          uri: http://localhost:8080
          predicates:
            - Path=/actuator/**
        - id: orders-service
          uri: http://localhost:8081
          predicates:
            - Path=/orders/**
