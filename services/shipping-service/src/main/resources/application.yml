server:
  port: 8089

spring:
  application:
    name: shipping-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: shipping-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Ensure the JsonSerializer doesn't rely on type headers (optional) and allow trusted packages
      properties:
        spring.json.add.type.headers: false
        spring.json.trusted.packages: "*"


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    # Default to false to avoid noisy connection errors in local/dev environments
    register-with-eureka: ${EUREKA_CLIENT_REGISTER_WITH_EUREKA:true}
    fetch-registry: ${EUREKA_CLIENT_FETCH_REGISTRY:true}
  instance:
    prefer-ip-address: true

jwt:
  secret: my-super-secret-key-which-is-long-enough
  expiration: 3600000
